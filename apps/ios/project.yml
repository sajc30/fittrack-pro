name: FitTrack
options:
  bundleIdPrefix: com.fittrack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

schemes:
  FitTrack:
    build:
      targets:
        FitTrack: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  FitTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FitTrack
    resources:
      - path: FitTrack/Resources
    info:
      path: FitTrack/Info.plist
      properties:
        CFBundleDisplayName: Iron Blueprint
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        CFBundleURLTypes:
          - CFBundleURLName: com.sajandeepcheema.fittrack.oauth
            CFBundleURLSchemes:
              - com.sajandeepcheema.fittrack
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: Q695BPQZUK
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: FitTrack/FitTrack.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.sajandeepcheema.fittrack
        PRODUCT_NAME: Iron Blueprint
